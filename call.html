<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>通話 文字起こし・AI要約ツール</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { color-scheme: light; }
  body { font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", Meiryo, sans-serif; }
  @keyframes pulse-rec { 0%,100%{opacity:1} 50%{opacity:.35} }
  .rec-dot { animation: pulse-rec 1.1s ease-in-out infinite; }
  @keyframes ringpulse { 0%,100%{box-shadow:0 0 0 0 rgba(79,70,229,.5)} 50%{box-shadow:0 0 0 6px rgba(79,70,229,0)} }
  .next-btn { animation: ringpulse 1.6s ease-in-out infinite; }
  .nice-scroll::-webkit-scrollbar { width: 8px; }
  .nice-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #c7d2fe; border-top-color:#4f46e5; border-radius:50%; animation: spin .8s linear infinite; vertical-align:-2px; }
</style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen text-sm">

<!-- マイク許可オーバーレイ -->
<div id="startOverlay" class="hidden fixed inset-0 z-50 bg-slate-900/60 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl p-6 max-w-sm text-center shadow-xl">
    <div class="text-3xl mb-2">🎙️</div>
    <p class="font-bold mb-1">マイクの使用を許可してください</p>
    <p class="text-slate-500 mb-4 text-xs">開いている間ずっと待機します。開始するにはマイクを許可してください（初回のみ）。</p>
    <button id="overlayStartBtn" class="px-5 py-2.5 rounded-lg bg-emerald-600 text-white font-semibold hover:bg-emerald-700">▶ 待機を開始</button>
    <p id="overlayError" class="text-xs text-rose-500 mt-3 hidden"></p>
  </div>
</div>

<div class="max-w-5xl mx-auto p-3 sm:p-4">

  <!-- 上段：担当者＋ステータス＋メーター -->
  <div class="flex flex-wrap items-center gap-x-4 gap-y-2 mb-3">
    <div class="flex items-center gap-2">
      <span class="text-xs font-semibold text-slate-500">担当者</span>
      <select id="agentSelect" class="border border-slate-300 rounded-lg px-3 py-1.5 text-sm bg-white font-semibold focus:outline-none focus:ring-2 focus:ring-emerald-400">
        <option value="">選択</option>
      </select>
      <a id="mySheetLink" href="#" target="_blank" rel="noopener" class="hidden text-xs text-emerald-700 hover:underline font-semibold whitespace-nowrap">📄 シートを開く ↗</a>
    </div>
    <div id="statusPill" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-500">
      <span class="w-2.5 h-2.5 rounded-full bg-slate-300"></span><span id="statusText">停止中</span>
    </div>
    <span id="channelInfo" class="text-xs font-semibold text-slate-400"></span>
    <div class="flex-1 min-w-[220px] grid grid-cols-2 gap-3">
      <div>
        <div class="flex justify-between text-[10px] text-slate-500"><span>自分(L)</span><span id="levelLText">0%</span></div>
        <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden"><div id="levelL" class="h-full bg-sky-500" style="width:0%"></div></div>
      </div>
      <div>
        <div class="flex justify-between text-[10px] text-slate-500"><span>相手(R)</span><span id="levelRText">0%</span></div>
        <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden"><div id="levelR" class="h-full bg-amber-500" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- メインカード -->
  <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 space-y-3">

    <!-- マイク選択 -->
    <div class="flex items-end gap-2">
      <div class="flex-1">
        <label class="block text-xs font-semibold text-slate-500 mb-1">マイク（入力デバイス）</label>
        <select id="deviceSelect" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-emerald-400">
          <option value="">（権限取得後に表示）</option>
        </select>
      </div>
      <button id="refreshDevices" title="更新" class="px-3 py-2 border border-slate-300 rounded-lg hover:bg-slate-50">↻</button>
    </div>

    <!-- リアルタイム文字起こし（2者チャット表示・閲覧専用） -->
    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="block text-xs font-semibold text-slate-500">リアルタイム文字起こし <span class="font-normal text-slate-400">（自分=左/青、相手=右/黄。配線により逆の場合あり）</span></label>
        <button id="copyTranscriptBtn" class="text-xs text-emerald-700 hover:underline">📋 全文コピー</button>
      </div>
      <div id="chatArea" class="h-64 overflow-y-auto nice-scroll border border-slate-200 rounded-lg bg-slate-50 px-3 py-3 space-y-2">
        <p id="chatEmpty" class="text-slate-400 text-center mt-16 text-xs">通話が始まると、ここに会話がリアルタイムで表示されます。</p>
      </div>
    </div>

    <!-- ボタン群 -->
    <div class="flex flex-wrap gap-2 items-center pt-1">
      <button id="endCallBtn" class="px-4 py-2.5 rounded-lg bg-indigo-600 text-white font-bold hover:bg-indigo-700 active:scale-95 transition">📞 電話終了（AI要約）</button>
      <button id="saveBtn" class="px-4 py-2.5 rounded-lg bg-emerald-600 text-white font-semibold hover:bg-emerald-700 active:scale-95 transition">💾 履歴保存</button>
      <button id="copySummaryBtn" class="px-4 py-2.5 rounded-lg border border-slate-300 text-slate-700 font-semibold hover:bg-slate-50 active:scale-95 transition">📋 要約コピー</button>
      <span class="flex-1"></span>
      <button id="pauseBtn" class="px-3 py-2 rounded-lg bg-rose-500 text-white font-semibold text-xs hover:bg-rose-600 transition">⏸ 一時停止</button>
      <button id="clearBtn" class="px-3 py-2 rounded-lg border border-slate-300 text-slate-500 font-semibold text-xs hover:bg-slate-50 transition">🗑 新規通話</button>
      <span id="toast" class="text-sm font-semibold self-center opacity-0 transition-opacity"></span>
    </div>

    <!-- AI要約結果 -->
    <div>
      <label class="block text-xs font-semibold text-slate-500 mb-1">AI要約（録音した音声を通話終了後に解析）</label>
      <div id="summaryOut" class="min-h-[110px] whitespace-pre-wrap leading-relaxed border border-slate-200 rounded-lg bg-slate-50 px-4 py-3 text-sm text-slate-700"><span class="text-slate-400">「電話終了（AI要約）」を押すと、録音音声をAIが解析して タイトル・相手の名前・電話番号・工務店コード・要約 を箇条書きで表示します。</span></div>
    </div>
  </section>

  <footer class="text-center text-xs text-slate-400 mt-4">Chrome / Edge で動作 ・ <a href="index.html" class="text-emerald-700 hover:underline">🔍 工務店コード検索へ</a></footer>
</div>

<script>
/* ===== 設定 ===== */
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxVvYJ0QD0McQtiitEebL7bmBPyUVmohOeCw9RmYzpZeiy2_lrtQ-5quDoD-_M-kfHg/exec';
const AGENTS = ['石田','戸塚','根木','水野','村松','藤森','河西','鈴木'];
const MAX_AUDIO_MB = 14; // これを超える録音はAI解析せずフォールバック(Gemini/GASの受信上限対策。32kbpsで約1時間分)

const state = {
  audioContext:null, mediaStream:null, source:null, splitter:null,
  analyserL:null, analyserR:null, recognition:null,
  shouldListen:false, recognitionRunning:false, rafId:null,
  capturing:true, phase:'capturing', transcript:[], callStartAt:null, lastRowUrl:'',
  recorder:null, chunks:[], summaryText:'', parsed:null,
  energyL:0, energyR:0,   // 直近発話のチャンネル別音量(話者判定用)
};
const $ = (id) => document.getElementById(id);

const deviceSelect=$('deviceSelect'), endCallBtn=$('endCallBtn'), saveBtn=$('saveBtn'),
  copySummaryBtn=$('copySummaryBtn'), pauseBtn=$('pauseBtn'), clearBtn=$('clearBtn'),
  agentSelect=$('agentSelect'), mySheetLink=$('mySheetLink'),
  startOverlay=$('startOverlay'), overlayStartBtn=$('overlayStartBtn'), overlayError=$('overlayError'),
  statusText=$('statusText'), statusPill=$('statusPill'),
  levelL=$('levelL'), levelR=$('levelR'), levelLText=$('levelLText'), levelRText=$('levelRText'),
  chatArea=$('chatArea'), summaryOut=$('summaryOut');

/* ===== 担当者プルダウン ===== */
AGENTS.forEach(n => { const o=document.createElement('option'); o.value=n; o.textContent=n; agentSelect.appendChild(o); });
agentSelect.value = localStorage.getItem('agentName') || '';
agentSelect.addEventListener('change', () => { localStorage.setItem('agentName', agentSelect.value); refreshMySheetLink(); });

async function listDevices(){
  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const inputs = devices.filter(d=>d.kind==='audioinput');
    const prev = deviceSelect.value;
    deviceSelect.innerHTML='';
    if(!inputs.length){ deviceSelect.innerHTML='<option value="">入力デバイスなし</option>'; return; }
    inputs.forEach((d,i)=>{ const o=document.createElement('option'); o.value=d.deviceId; o.textContent=d.label||('マイク '+(i+1)); deviceSelect.appendChild(o); });
    if(prev) deviceSelect.value=prev;
  }catch(e){ console.error(e); }
}

function setStatus(mode){
  const map={ idle:['停止中','bg-slate-300','text-slate-500'], listening:['待機中(録音中)','bg-red-500 rec-dot','text-red-600'],
    paused:['一時停止中','bg-yellow-400','text-yellow-600'], error:['エラー','bg-red-500','text-red-600'] };
  const a=map[mode]||map.idle; statusText.textContent=a[0]; statusText.className=a[2]; statusPill.querySelector('span').className='w-2.5 h-2.5 rounded-full '+a[1];
}
function updateChannelInfo(ch){
  const el=$('channelInfo');
  if(ch>=2){ el.textContent='入力：'+ch+'ch'; el.className='text-xs font-semibold text-emerald-600'; }
  else if(ch===1){ el.textContent='入力：1ch（モノラル・話者分けは近似）'; el.className='text-xs font-semibold text-rose-600'; }
  else el.textContent='';
}

async function buildAudioGraph(deviceId){
  const constraints={ audio:{ deviceId:deviceId?{exact:deviceId}:undefined, channelCount:2, echoCancellation:false, noiseSuppression:false, autoGainControl:false }, video:false };
  state.mediaStream=await navigator.mediaDevices.getUserMedia(constraints);
  await listDevices();
  state.audioContext=new (window.AudioContext||window.webkitAudioContext)();
  if(state.audioContext.state==='suspended') await state.audioContext.resume();
  state.source=state.audioContext.createMediaStreamSource(state.mediaStream);
  const ch=state.mediaStream.getAudioTracks()[0].getSettings().channelCount; updateChannelInfo(ch);
  state.splitter=state.audioContext.createChannelSplitter(2); state.source.connect(state.splitter);
  state.analyserL=state.audioContext.createAnalyser(); state.analyserR=state.audioContext.createAnalyser();
  state.analyserL.fftSize=1024; state.analyserR.fftSize=1024;
  state.splitter.connect(state.analyserL,0); state.splitter.connect(state.analyserR,1);
  startRecorder();
}

/* ===== 録音(AI解析用。ブラウザ内のみ保持) ===== */
function startRecorder(){
  if(!window.MediaRecorder || !state.mediaStream) return;
  try{
    state.chunks=[];
    const opt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? {mimeType:'audio/webm;codecs=opus', audioBitsPerSecond:32000} : {};
    state.recorder=new MediaRecorder(state.mediaStream, opt);
    state.recorder.ondataavailable=function(e){ if(e.data && e.data.size) state.chunks.push(e.data); };
    state.recorder.start(1000);
  }catch(e){ console.warn('録音開始失敗(フォールバック動作):', e); state.recorder=null; }
}
function restartRecorder(){
  if(state.recorder && state.recorder.state!=='inactive'){ try{ state.recorder.stop(); }catch(e){} }
  startRecorder();
}
function stopRecorderAndGetBlob(){
  return new Promise(function(resolve){
    if(!state.recorder || state.recorder.state==='inactive'){ resolve(state.chunks.length?new Blob(state.chunks,{type:'audio/webm'}):null); return; }
    state.recorder.onstop=function(){ resolve(state.chunks.length?new Blob(state.chunks,{type:'audio/webm'}):null); };
    try{ state.recorder.stop(); }catch(e){ resolve(null); }
  });
}
function blobToBase64(blob){
  return new Promise(function(resolve,reject){
    const r=new FileReader();
    r.onload=function(){ resolve(String(r.result).split(',')[1]); };
    r.onerror=reject;
    r.readAsDataURL(blob);
  });
}

function rms(a){ const b=new Uint8Array(a.fftSize); a.getByteTimeDomainData(b); let s=0; for(let i=0;i<b.length;i++){const v=(b[i]-128)/128; s+=v*v;} return Math.sqrt(s/b.length); }
function meterLoop(){
  if(!state.analyserL) return;
  const l=rms(state.analyserL), r=rms(state.analyserR);
  state.energyL+=l; state.energyR+=r;
  levelL.style.width=Math.min(100,Math.round(l*280))+'%'; levelR.style.width=Math.min(100,Math.round(r*280))+'%';
  levelLText.textContent=Math.min(100,Math.round(l*280))+'%'; levelRText.textContent=Math.min(100,Math.round(r*280))+'%';
  state.rafId=requestAnimationFrame(meterLoop);
}
function stopMeters(){ if(state.rafId) cancelAnimationFrame(state.rafId); state.rafId=null; levelL.style.width='0%'; levelR.style.width='0%'; levelLText.textContent='0%'; levelRText.textContent='0%'; }

/* ===== リアルタイム文字起こし ===== */
function initRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Chrome / Edge をお使いください（Web Speech API 未対応）。'); return null; }
  const rec=new SR(); rec.lang='ja-JP'; rec.continuous=true; rec.interimResults=true; rec.maxAlternatives=1;
  rec.onstart=function(){ state.recognitionRunning=true; };
  rec.onresult=function(e){
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const res=e.results[i]; const txt=res[0].transcript;
      if(res.isFinal) commitFinal(txt.trim()); else interim+=txt;
    }
    if(interim && state.capturing) renderTranscript(interim);
  };
  rec.onerror=function(e){
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){ setStatus('error'); state.shouldListen=false; alert('マイクが許可されていません。'); }
    else console.warn('recognition error（自動回復）:', e.error);
  };
  rec.onend=function(){ state.recognitionRunning=false; if(state.shouldListen) setTimeout(safeStartRecognition,250); };
  return rec;
}
function safeStartRecognition(){ if(!state.recognition||state.recognitionRunning||!state.shouldListen) return; try{ state.recognition.start(); }catch(e){} }

function nowLabel(){ return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
function currentSide(){
  // 直近発話のチャンネル別音量で話者を推定(L=自分/R=相手)。ほぼ同じなら不明
  const l=state.energyL, r=state.energyR;
  if(l+r<0.01) return '?';
  if(l>r*1.3) return 'L';
  if(r>l*1.3) return 'R';
  return '?';
}
function bubbleHtml(t, interim){
  const escH=function(s){return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});};
  const side=t.side||'?';
  const base='max-w-[78%] rounded-xl px-3 py-1.5 text-sm leading-relaxed border';
  if(side==='L') return '<div class="flex justify-start"><div class="'+base+' bg-sky-50 border-sky-200'+(interim?' opacity-60':'')+'"><span class="block text-[10px] text-sky-500 font-semibold">自分 '+(t.ts||'')+'</span>'+escH(t.text)+'</div></div>';
  if(side==='R') return '<div class="flex justify-end"><div class="'+base+' bg-amber-50 border-amber-200'+(interim?' opacity-60':'')+'"><span class="block text-[10px] text-amber-600 font-semibold">相手 '+(t.ts||'')+'</span>'+escH(t.text)+'</div></div>';
  return '<div class="flex justify-center"><div class="'+base+' bg-white border-slate-200 text-slate-600'+(interim?' opacity-60':'')+'"><span class="block text-[10px] text-slate-400 font-semibold">'+(t.ts||'')+'</span>'+escH(t.text)+'</div></div>';
}
function renderTranscript(interim){
  let html=state.transcript.map(function(t){ return bubbleHtml(t,false); }).join('');
  if(interim) html+=bubbleHtml({text:interim, side:currentSide(), ts:''}, true);
  chatArea.innerHTML=html||'<p class="text-slate-400 text-center mt-16 text-xs">通話が始まると、ここに会話がリアルタイムで表示されます。</p>';
  chatArea.scrollTop=chatArea.scrollHeight;
}
function commitFinal(text){
  if(!text||!state.capturing) return;
  if(!state.callStartAt) state.callStartAt=new Date();
  state.transcript.push({text:text, ts:nowLabel(), side:currentSide()});
  state.energyL=0; state.energyR=0;
  renderTranscript();
}
function transcriptText(){
  return state.transcript.map(function(t){ return (t.side==='L'?'自分: ':t.side==='R'?'相手: ':'')+t.text; }).join('\n');
}

async function startCall(){
  if(!state.audioContext){ await buildAudioGraph(deviceSelect.value); }
  else if(state.audioContext.state==='suspended') await state.audioContext.resume();
  state.recognition=state.recognition||initRecognition();
  if(!state.recognition) throw new Error('認識初期化失敗');
  state.shouldListen=true; safeStartRecognition(); meterLoop();
  if(state.recorder && state.recorder.state==='paused'){ try{ state.recorder.resume(); }catch(e){} }
  setStatus('listening'); pauseBtn.textContent='⏸ 一時停止'; pauseBtn.className='px-3 py-2 rounded-lg bg-rose-500 text-white font-semibold text-xs hover:bg-rose-600 transition';
}
function pauseCall(){
  state.shouldListen=false;
  if(state.recognition){ try{ state.recognition.stop(); }catch(e){} }
  if(state.recorder && state.recorder.state==='recording'){ try{ state.recorder.pause(); }catch(e){} }
  if(state.audioContext && state.audioContext.state==='running') state.audioContext.suspend();
  stopMeters(); setStatus('paused');
  pauseBtn.textContent='▶ 待機再開'; pauseBtn.className='px-3 py-2 rounded-lg bg-emerald-600 text-white font-semibold text-xs hover:bg-emerald-700 transition';
}
function togglePause(){ if(state.shouldListen) pauseCall(); else autoStart(); }
function showOverlay(msg){ startOverlay.classList.remove('hidden'); if(msg){ overlayError.textContent=msg; overlayError.classList.remove('hidden'); } else overlayError.classList.add('hidden'); }
function hideOverlay(){ startOverlay.classList.add('hidden'); overlayError.classList.add('hidden'); }
async function autoStart(){
  try{ await startCall(); if(state.audioContext && state.audioContext.state!=='running'){ showOverlay('「待機を開始」を押してください。'); return; } hideOverlay(); }
  catch(e){ const denied=e&&(e.name==='NotAllowedError'||e.name==='SecurityError'); showOverlay(denied?'マイクがブロックされています。アドレスバーの🔒から許可してください。':''); setStatus('error'); }
}

function setPhase(p){
  state.phase=p;
  endCallBtn.classList.toggle('next-btn', p==='capturing');
  saveBtn.classList.toggle('next-btn', p==='ended');
}

/* ===== 電話終了 → 録音音声をAI解析 ===== */
function parseSummary(text){
  const lines=text.split('\n').map(function(l){ return l.replace(/^[・\-\*\s]+/,'').trim(); }).filter(Boolean);
  return {
    title: lines[0]||'', name: lines[1]||'', phone: lines[2]||'', code: lines[3]||'',
    bullets: lines.slice(4),
  };
}
function fallbackSummary(){
  const t=transcriptText();
  const first=(state.transcript[0]?state.transcript[0].text:'通話内容').slice(0,10);
  const phone=(function(){ const m=t.replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);}).match(/0\d[\d\-\s]{7,12}\d/); return m?m[0].replace(/\s/g,''):'不明'; })();
  const name=(function(){ const m=t.match(/([一-龥]{1,5})[ 　]?(?:と申します|と言います|といいます)/); return m?m[1]:'不明'; })();
  const bullets=state.transcript.slice(0,6).map(function(x){ return '・'+x.text; }).join('\n');
  return '・'+first+'\n・'+name+'\n・'+phone+'\n・不明\n'+(bullets||'・（内容なし）');
}
function showSummary(text, note){
  state.summaryText=text;
  state.parsed=parseSummary(text);
  summaryOut.textContent=text+(note?'\n\n'+note:'');
}
async function endCall(){
  if(!state.transcript.length && !state.chunks.length){ showToast('通話内容がありません', true); return; }
  state.capturing=false;
  setPhase('ended');
  summaryOut.innerHTML='<span class="spinner"></span> <span class="text-indigo-600 font-semibold">AIが録音音声を解析しています…（通話の長さにより数十秒かかります）</span>';
  try{
    const blob=await stopRecorderAndGetBlob();
    if(!blob) throw new Error('録音データなし');
    if(blob.size > MAX_AUDIO_MB*1024*1024) throw new Error('録音が長すぎます('+Math.round(blob.size/1048576)+'MB)');
    const b64=await blobToBase64(blob);
    const res=await fetch(WEBAPP_URL,{method:'POST',body:JSON.stringify({action:'summarize', mimeType: blob.type||'audio/webm', audio:b64})});
    const j=await res.json();
    if(!(j&&j.ok&&j.text)) throw new Error(j&&j.error?j.error:'AI応答エラー');
    showSummary(j.text.trim());
    showToast('AI要約ができました。確認して「履歴保存」を押してください');
  }catch(e){
    console.warn('AI解析失敗→簡易要約に切替:', e);
    showSummary(fallbackSummary(), '※AI解析に失敗したため、リアルタイム文字起こしからの簡易要約です（'+(e.message||e)+'）');
    showToast('AI解析に失敗。簡易要約を表示しました', true);
  }
}

function clearCall(){
  if(state.transcript.length && !confirm('クリアして新しい通話を始めますか？')) return;
  state.transcript=[]; state.callStartAt=null; state.lastRowUrl=''; state.capturing=true;
  state.summaryText=''; state.parsed=null; state.energyL=0; state.energyR=0;
  renderTranscript();
  summaryOut.innerHTML='<span class="text-slate-400">「電話終了（AI要約）」を押すと、録音音声をAIが解析して タイトル・相手の名前・電話番号・工務店コード・要約 を箇条書きで表示します。</span>';
  restartRecorder();
  setPhase('capturing');
  if(!state.shouldListen) autoStart();
}

function guessCategory(t){
  if(/(故障|壊れ|動かな|不具合|エラー|起動しな|つかな)/.test(t)) return '故障';
  if(/(クレーム|苦情|困っ|ひどい|最悪|怒|不満)/.test(t)) return 'クレーム';
  if(/(見積|金額|料金|価格|いくら|費用|お見積)/.test(t)) return '見積';
  if(/(要望|してほし|お願いしたい|希望|改善)/.test(t)) return '要望';
  return '質問';
}

function showToast(msg,isErr){ const t=$('toast'); t.textContent=msg; t.className='text-sm font-semibold self-center transition-opacity '+(isErr?'text-rose-600':'text-emerald-600'); t.style.opacity='1'; setTimeout(function(){t.style.opacity='0';},2600); }

async function saveHistory(){
  const agent=agentSelect.value;
  if(!agent){ showToast('担当者を選択してください', true); return null; }
  const trans=transcriptText();
  if(!trans && !state.summaryText){ showToast('保存する内容がありません', true); return null; }
  const p=state.parsed||{};
  const payload={
    datetime:(state.callStartAt||new Date()).toLocaleString('ja-JP'),
    agent:agent, company:'', name:p.name&&p.name!=='不明'?p.name:'', phone:p.phone&&p.phone!=='不明'?p.phone:'',
    answer:'', bukken:'', address:'',
    category:guessCategory(trans+state.summaryText),
    summary:state.summaryText||'', transcript:trans
  };
  showToast('保存中…');
  try{
    const res=await fetch(WEBAPP_URL,{method:'POST',body:JSON.stringify(payload)});
    const j=await res.json();
    if(j&&j.ok&&j.url){ state.lastRowUrl=j.url; showToast('履歴を保存しました'); return j.url; }
    showToast('保存はできましたが行URL取得に失敗', true); return null;
  }catch(e){ console.error(e); showToast('保存に失敗（デプロイのアクセス権を確認）', true); return null; }
}

async function clip(text){ try{ await navigator.clipboard.writeText(text); }catch(e){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); } }

async function refreshMySheetLink(){
  const agent=agentSelect.value;
  if(!agent){ mySheetLink.classList.add('hidden'); return; }
  try{
    const res=await fetch(WEBAPP_URL+'?agent='+encodeURIComponent(agent));
    const d=await res.json();
    if(d&&d.ok&&d.sheetUrl){ mySheetLink.href=d.sheetUrl; mySheetLink.textContent='📄 '+agent+' のシートを開く ↗'; mySheetLink.classList.remove('hidden'); }
    else mySheetLink.classList.add('hidden');
  }catch(e){ mySheetLink.classList.add('hidden'); }
}

$('copyTranscriptBtn').addEventListener('click', async function(){ const t=transcriptText(); if(t){ await clip(t); showToast('全文をコピーしました'); } else showToast('コピーする内容がありません', true); });
copySummaryBtn.addEventListener('click', async function(){ if(state.summaryText){ await clip(state.summaryText); showToast('要約をコピーしました'); } else showToast('要約がまだありません', true); });
endCallBtn.addEventListener('click',endCall);
saveBtn.addEventListener('click',saveHistory);
pauseBtn.addEventListener('click',togglePause);
clearBtn.addEventListener('click',clearCall);
overlayStartBtn.addEventListener('click',autoStart);
$('refreshDevices').addEventListener('click',listDevices);
deviceSelect.addEventListener('change',function(){ pauseCall(); try{ state.audioContext&&state.audioContext.close(); }catch(e){} state.audioContext=null; state.mediaStream=null; state.recognition=null; state.recorder=null; autoStart(); });
navigator.mediaDevices.addEventListener?.('devicechange',listDevices);

setStatus('idle'); listDevices(); refreshMySheetLink(); setPhase('capturing'); autoStart();
</script>
</body>
</html>
